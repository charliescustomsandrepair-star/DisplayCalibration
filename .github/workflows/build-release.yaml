name: Build and Release All Platforms

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg cache
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-windows-${{ hashFiles('vcpkg.json') }}

      - name: Install vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat

      - name: Install dependencies
        run: C:\vcpkg\vcpkg install opencv glew glfw3 --triplet x64-windows

      - name: Build
        run: |
          cmake --preset demo-vcpkg -DCMAKE_BUILD_TYPE=Release
          cmake --build --preset demo-vcpkg --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-windows
          path: build/demo-vcpkg/Release/demo.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install opencv glew glfw cmake ninja pkg-config

      - name: Build
        run: |
          cmake --preset demo -DCMAKE_BUILD_TYPE=Release
          cmake --build --preset demo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-macos
          path: build/demo

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libopencv-dev \
            libglew-dev \
            libglfw3-dev \
            libgl1-mesa-dev \
            cmake \
            ninja-build \
            pkg-config

      - name: Build
        run: |
          cmake --preset demo -DCMAKE_BUILD_TYPE=Release
          cmake --build --preset demo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-linux
          path: build/demo

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            demo-windows/demo.exe
            demo-macos/demo
            demo-linux/demo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
