name: Build and Release All Platforms

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: vcpkg install opencv:x64-windows glew:x64-windows glfw3:x64-windows

      - name: Build
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release `
                -DUSE_OPENCV=ON `
                -DBUILD_DEMO=ON `
                -DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake `
                -G "Visual Studio 17 2022" ..
          cmake --build . --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-windows
          path: build/Release/demo.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install opencv glew glfw cmake ninja

      - name: Build
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DUSE_OPENCV=ON \
                -DBUILD_DEMO=ON \
                -G Ninja ..
          cmake --build .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-macos
          path: build/demo

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libopencv-dev \
            libglew-dev \
            libglfw3-dev \
            libgl1-mesa-dev \
            cmake \
            ninja-build

      - name: Build
        run: |
          mkdir build
          cd build
          # Removed manual GLEW paths so CMake uses the installed dev package automatically
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DUSE_OPENCV=ON \
                -DBUILD_DEMO=ON \
                -G Ninja ..
          cmake --build .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-linux
          path: build/demo

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/demo-windows/demo.exe
            artifacts/demo-macos/demo
            artifacts/demo-linux/demo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
