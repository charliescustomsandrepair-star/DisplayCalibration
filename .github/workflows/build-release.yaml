name: Build and Release All Platforms

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # We use vcpkg on all three to match your CMake's "CONFIG" requirement
        include:
          - os: windows-latest
            triplet: x64-windows
            artifact_name: demo-windows
            binary_path: build/Release/demo.exe
          - os: ubuntu-latest
            triplet: x64-linux
            artifact_name: demo-linux
            binary_path: build/demo
          - os: macos-latest
            triplet: x64-osx
            artifact_name: demo-macos
            binary_path: build/demo

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies (vcpkg)
        run: vcpkg install opencv:${{ matrix.triplet }} glew:${{ matrix.triplet }} glfw3:${{ matrix.triplet }}

      - name: Configure CMake
        run: |
          mkdir build
          cmake -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DUSE_OPENCV=ON `
            -DBUILD_DEMO=ON `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
        shell: pwsh

      - name: Build
        run: cmake --build build --config Release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_path }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/demo-windows/demo.exe
            artifacts/demo-macos/demo
            artifacts/demo-linux/demo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
