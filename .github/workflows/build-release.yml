name: Build and Release All Platforms

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
      - name: Install dependencies
        run: C:\vcpkg\vcpkg install opencv:x64-windows glew:x64-windows glfw3:x64-windows
      - name: Build
        run: |
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DUSE_OPENCV=ON -DBUILD_DEMO=ON -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake -G "Visual Studio 17 2022" ..
          cmake --build . --config Release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-windows
          path: build/Release/demo.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: brew install opencv glew glfw3 cmake ninja
      - name: Build
        run: |
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DUSE_OPENCV=ON -DBUILD_DEMO=ON -G Ninja ..
          cmake --build . --config Release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-macos
          path: build/demo

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopencv-dev libglew-dev libglfw3-dev cmake ninja-build
      - name: Fix GLEW Config
        run: |
          sudo mkdir -p /usr/lib/cmake/GLEW
          sudo ln -s /usr/lib/x86_64-linux-gnu/cmake/glew/glew-config.cmake /usr/lib/cmake/GLEW/GLEWConfig.cmake
      - name: Build
        run: |
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DUSE_OPENCV=ON -DBUILD_DEMO=ON -DCMAKE_PREFIX_PATH=/usr/lib/cmake/GLEW -G Ninja ..
          cmake --build . --config Release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-linux
          path: build/demo

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            demo-windows/demo.exe
            demo-macos/demo
            demo-linux/demo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
